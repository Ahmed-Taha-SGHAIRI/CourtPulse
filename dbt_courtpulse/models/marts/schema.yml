version: 2

models:
  - name: mart_player_efficiency
    description: "Player efficiency ratings with tier classification."
    columns:
      - name: player_id
        description: "Unique player identifier."
        tests:
          - not_null
          - unique
      - name: per
        description: "Player Efficiency Rating."
      - name: tier
        description: "Tier label: Star, Starter, Role Player, or Bench."
        tests:
          - accepted_values:
              values: ['Star', 'Starter', 'Role Player', 'Bench']

  - name: mart_team_standings
    description: "Enriched team standings with win percentage and playoff status."
    columns:
      - name: team_id
        description: "Unique team identifier."
        tests:
          - not_null
          - unique
      - name: win_pct
        description: "Win percentage (0–1)."
      - name: playoff_status
        description: "Playoff/Play-In/Eliminated label."

  - name: mart_hot_cold_streaks
    description: "Rolling 5-game win rate and streak label per team."
    columns:
      - name: team_name
        description: "Full team name."
        tests:
          - not_null
          - unique
      - name: streak_label
        description: "Streak label based on rolling win rate."
        tests:
          - accepted_values:
              values: ['On Fire', 'Hot', 'Lukewarm', 'Cold', 'Freezing']
