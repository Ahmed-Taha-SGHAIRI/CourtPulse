version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CourtPulse — Real-Time NBA Analytics Pipeline
# docker-compose up -d  →  everything starts
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: "dbt-duckdb"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    DUCKDB_PATH: ${DUCKDB_PATH:-/data/courtpulse.duckdb}
    NBA_SEASON: ${NBA_SEASON:-2024}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./storage:/opt/airflow/storage
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt_courtpulse:/opt/airflow/dbt_courtpulse
    - courtpulse-data:/data
  networks:
    - courtpulse-net
  depends_on:
    - minio
    - postgres

services:
  # ── PostgreSQL for Airflow ──────────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: courtpulse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - courtpulse-pgdata:/var/lib/postgresql/data
    networks:
      - courtpulse-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: courtpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat"
    networks:
      - courtpulse-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: courtpulse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - courtpulse-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible Data Lake) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: courtpulse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - courtpulse-data:/data
    networks:
      - courtpulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow DB Init ──────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: courtpulse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@courtpulse.local || true
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: courtpulse-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: courtpulse-airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-webserver
    restart: always

  # ── Kafka Producer (live score simulator) ────────────────────────────────────
  kafka-producer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtpulse-kafka-producer
    command: python /app/kafka_producer_scores.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      DUCKDB_PATH: ${DUCKDB_PATH:-/data/courtpulse.duckdb}
    volumes:
      - ./ingestion:/app
      - ./storage:/app/storage
      - courtpulse-data:/data
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - courtpulse-net
    restart: on-failure

  # ── Kafka Consumer ────────────────────────────────────────────────────────────
  kafka-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtpulse-kafka-consumer
    command: python /app/kafka_consumer_scores.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      DUCKDB_PATH: ${DUCKDB_PATH:-/data/courtpulse.duckdb}
    volumes:
      - ./kafka:/app
      - ./storage:/app/storage
      - courtpulse-data:/data
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - courtpulse-net
    restart: on-failure

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtpulse-backend
    ports:
      - "8000:8000"
    environment:
      DUCKDB_PATH: ${DUCKDB_PATH:-/data/courtpulse.duckdb}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - courtpulse-data:/data
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - courtpulse-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courtpulse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - courtpulse-net
    restart: always

# ── Shared Resources ─────────────────────────────────────────────────────────
networks:
  courtpulse-net:
    driver: bridge

volumes:
  courtpulse-data:
  courtpulse-pgdata:
    driver: local
