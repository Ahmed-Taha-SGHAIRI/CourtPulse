name: court-pulse

# ─────────────────────────────────────────────────────────────────────────────
# CourtPulse — Real-Time NBA Analytics Pipeline
# docker-compose up -d  →  everything starts, frontend at http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

networks:
  courtpulse-net:
    driver: bridge

volumes:
  courtpulse-data:
  minio-data:
  airflow-db:

services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: courtpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - courtpulse-net

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: courtpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - courtpulse-net

  # ── MinIO (S3-compatible Data Lake) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: courtpulse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - courtpulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init (create buckets) ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: courtpulse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    networks:
      - courtpulse-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/raw &&
      mc mb -p local/streaming &&
      mc mb -p local/processed
      "

  # ── Kafka Producer (live scores) ─────────────────────────────────────────────
  kafka-producer:
    build:
      context: ./ingestion
    container_name: courtpulse-kafka-producer
    command: python kafka_producer.py
    env_file: .env
    depends_on:
      - kafka
      - minio
    networks:
      - courtpulse-net
    restart: unless-stopped

  # ── Kafka Consumer ────────────────────────────────────────────────────────────
  kafka-consumer:
    build:
      context: ./kafka
    container_name: courtpulse-kafka-consumer
    command: python kafka_consumer.py
    env_file: .env
    depends_on:
      - kafka
      - minio
    volumes:
      - courtpulse-data:/data
    networks:
      - courtpulse-net
    restart: unless-stopped

  # ── Airflow Init ──────────────────────────────────────────────────────────────
  airflow-init:
    build:
      context: ./airflow
    container_name: courtpulse-airflow-init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@courtpulse.com || true
      "
    volumes:
      - courtpulse-data:/data
      - airflow-db:/opt/airflow
    networks:
      - courtpulse-net
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: ./airflow
    container_name: courtpulse-airflow-webserver
    env_file: .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver
    ports:
      - "8080:8080"
    volumes:
      - courtpulse-data:/data
      - airflow-db:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_courtpulse:/opt/airflow/dbt_courtpulse
      - ./ingestion:/opt/airflow/ingestion
      - ./storage:/opt/airflow/storage
    networks:
      - courtpulse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: ./airflow
    container_name: courtpulse-airflow-scheduler
    env_file: .env
    depends_on:
      airflow-webserver:
        condition: service_healthy
    command: airflow scheduler
    volumes:
      - courtpulse-data:/data
      - airflow-db:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_courtpulse:/opt/airflow/dbt_courtpulse
      - ./ingestion:/opt/airflow/ingestion
      - ./storage:/opt/airflow/storage
    networks:
      - courtpulse-net
    restart: unless-stopped

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: courtpulse-backend
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
      kafka-consumer:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - courtpulse-data:/data
    networks:
      - courtpulse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: courtpulse-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - courtpulse-net
    restart: unless-stopped
